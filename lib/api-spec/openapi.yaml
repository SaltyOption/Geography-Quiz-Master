openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Geography Quiz platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quizzes
    description: Quiz management
  - name: questions
    description: Question management
  - name: quiz-attempts
    description: Quiz attempt and scoring
  - name: user-progress
    description: User progress tracking
  - name: categories
    description: Category hierarchy management
  - name: images
    description: Image hosting validation
  - name: me
    description: Current user identity and admin status
  - name: courses
    description: Layered learning courses (topics with modules and lessons)
  - name: contact
    description: Public contact form submissions
paths:
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories (flat)
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/tree:
    get:
      operationId: getCategoryTree
      tags: [categories]
      summary: Get the full category tree (nested)
      responses:
        "200":
          description: Nested category tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryNode"

  /categories/by-slug/{slug}:
    get:
      operationId: getCategoryBySlug
      tags: [categories]
      summary: Get a category and its quizzes (including descendants) by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category with ancestors, descendants, and quizzes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryWithQuizzes"
        "404":
          description: Not found

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (children's parent becomes null)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get current user identity and admin status
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /images/validate:
    get:
      operationId: validateImageUrl
      tags: [images]
      summary: Check whether an optimized image URL and its variants are hosted (admin only)
      description: >
        Pre-flight check used by the admin question form to warn, while typing,
        that an image under an optimized prefix (/regions/, /landmarks/) and its
        responsive variants are not yet hosted. Mirrors the write-time guard; the
        server-side 400 on save remains authoritative.
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Validation result for the supplied image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageValidationResult"
        "400":
          description: Missing or invalid url query parameter
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /images/gallery:
    get:
      operationId: getImageGallery
      tags: [images]
      summary: List hosted optimized images for the admin image picker (admin only)
      description: >
        Returns the locally hosted images under the optimized prefixes
        (/regions/, /landmarks/) that have all of their responsive variants on
        disk, grouped by prefix. Powers the visual cover-image picker so an admin
        can select a guaranteed-hosted image instead of typing a raw path.
      responses:
        "200":
          description: Grouped list of selectable hosted images
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGallery"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /newsletter/me:
    get:
      operationId: getNewsletterSubscription
      tags: [newsletter]
      summary: Get the current user's newsletter subscription status
      responses:
        "200":
          description: The current user's newsletter subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscription"
        "401":
          description: Not signed in
    patch:
      operationId: updateNewsletterSubscription
      tags: [newsletter]
      summary: Update the current user's newsletter subscription (opt in or out)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNewsletterSubscriptionBody"
      responses:
        "200":
          description: The updated newsletter subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscription"
        "401":
          description: Not signed in

  /newsletter/subscribers:
    get:
      operationId: getNewsletterSubscribers
      tags: [newsletter]
      summary: List subscribed newsletter recipients (admin only)
      responses:
        "200":
          description: Subscribed recipients and counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscribers"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /contact:
    post:
      operationId: submitContactMessage
      tags: [contact]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitContactMessageBody"
      responses:
        "201":
          description: The message was received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmittedContactMessage"
        "400":
          description: Invalid submission

  /contact/messages:
    get:
      operationId: listContactMessages
      tags: [contact]
      summary: List submitted contact messages (admin only)
      responses:
        "200":
          description: Contact messages and total count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessages"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /daily-quiz:
    get:
      operationId: getDailyQuiz
      tags: [quizzes]
      summary: Get today's daily quiz selection
      description: Returns the deterministic quiz of the day for the current UTC date.
      responses:
        "200":
          description: Today's daily quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyQuiz"
        "404":
          description: No quizzes available

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /quizzes:
    get:
      operationId: listQuizzes
      tags: [quizzes]
      summary: List all quizzes
      responses:
        "200":
          description: List of quizzes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizSummary"
    post:
      operationId: createQuiz
      tags: [quizzes]
      summary: Create a new quiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuizBody"
      responses:
        "201":
          description: Created quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quizzes/bulk-import:
    post:
      operationId: bulkImportQuizzes
      tags: [quizzes]
      summary: Bulk import quizzes and questions from a flat list grouped by topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkImportBody"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /quizzes/export:
    get:
      operationId: exportQuizzes
      tags: [quizzes]
      summary: Export all quizzes and questions in the bulk-import JSON shape
      responses:
        "200":
          description: All quizzes and questions, ready to be re-imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizExportResult"
        "422":
          description: Some questions are malformed and would not round-trip cleanly
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizExportError"

  /quizzes/{id}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      summary: Get a quiz with its questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizWithQuestions"
        "404":
          description: Quiz not found
    patch:
      operationId: updateQuiz
      tags: [quizzes]
      summary: Update a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuizBody"
      responses:
        "200":
          description: Updated quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "404":
          description: Quiz not found
    delete:
      operationId: deleteQuiz
      tags: [quizzes]
      summary: Delete a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Quiz not found

  /quizzes/{id}/questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List questions for a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a question for a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Quiz not found

  /quizzes/{id}/questions/import-by-category:
    post:
      operationId: importQuestionsByCategory
      tags: [questions]
      summary: Copy all questions tagged with a category (or any descendant) into this quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportQuestionsByCategoryBody"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportQuestionsByCategoryResult"
        "404":
          description: Quiz or category not found

  /quizzes/{id}/questions/{questionId}/check:
    post:
      operationId: checkAnswer
      tags: [quizzes]
      summary: Check a single answer and reveal its explanation and fun fact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckAnswerBody"
      responses:
        "200":
          description: Answer feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckAnswerResult"
        "400":
          description: Invalid request
        "404":
          description: Quiz or question not found

  /questions/{id}:
    get:
      operationId: getQuestion
      tags: [questions]
      summary: Get a single question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Not found
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionBody"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Not found
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /quiz-attempts:
    post:
      operationId: submitQuizAttempt
      tags: [quiz-attempts]
      summary: Submit answers for a quiz attempt and get score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuizAttemptBody"
      responses:
        "200":
          description: Quiz result with score and per-question feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizAttemptResult"

  /quizzes/{id}/stats:
    get:
      operationId: getQuizStats
      tags: [quizzes]
      summary: Get stats for a quiz (total attempts, average score)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizStats"
        "404":
          description: Not found

  /user/progress:
    get:
      operationId: getUserProgress
      tags: [user-progress]
      summary: Get the current user's quiz attempt history and stats
      responses:
        "200":
          description: User progress summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"
        "401":
          description: Unauthorized

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all learning courses with per-user mastery progress (when signed in)
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseSummary"

  /courses/bulk-import:
    post:
      operationId: bulkImportCourse
      tags: [courses]
      summary: Bulk import or update a course from a flat list of question objects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseImportBody"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseImportResult"

  /courses/{slug}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course with its modules (and per-user mastery if signed in)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"
        "404":
          description: Not found

  /courses/{slug}/modules/{moduleSlug}:
    get:
      operationId: getCourseModule
      tags: [courses]
      summary: Get a single module with its lessons and questions (locked modules return 403 for signed-in users)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: moduleSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Module detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleDetail"
        "403":
          description: Module is locked (previous module not yet mastered)
        "404":
          description: Not found

  /admin/courses/{slug}:
    get:
      operationId: getAdminCourse
      tags: [courses]
      summary: Admin - get a course with full nested modules, lessons, and questions (no mastery gating)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Admin course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCourseDetail"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Admin - update a course's editable fields (e.g. image)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseBody"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatedCourse"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /course-questions/{id}:
    patch:
      operationId: updateCourseQuestion
      tags: [courses]
      summary: Admin - update a single course (learning module) question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseQuestionBody"
      responses:
        "200":
          description: Updated course question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseQuestion"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /course-modules/{moduleId}/progress:
    get:
      operationId: getCourseModuleProgress
      tags: [courses]
      summary: Get the signed-in user's saved in-progress answers for a module
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved progress (null if anonymous or none saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleProgress"
    put:
      operationId: saveCourseModuleProgress
      tags: [courses]
      summary: Save the signed-in user's in-progress answers for a module (no-op for anonymous)
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveModuleProgressBody"
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleProgress"
    delete:
      operationId: clearCourseModuleProgress
      tags: [courses]
      summary: Clear the signed-in user's saved progress for a module (no-op for anonymous)
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved:
                    type: boolean
                required:
                  - saved

  /course-modules/{moduleId}/attempts:
    post:
      operationId: submitCourseModuleAttempt
      tags: [courses]
      summary: Submit answers for a module attempt and get score + per-question feedback
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitModuleAttemptBody"
      responses:
        "200":
          description: Module attempt result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleAttemptResult"
        "404":
          description: Module not found

  /user/progress/{quizId}:
    get:
      operationId: getUserQuizProgress
      tags: [user-progress]
      summary: Get the current user's history for a specific quiz
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User quiz history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserQuizProgress"
        "401":
          description: Unauthorized

components:
  schemas:
    Me:
      type: object
      properties:
        userId:
          type: ["string", "null"]
        isAdmin:
          type: boolean
      required:
        - userId
        - isAdmin

    ImageValidationResult:
      type: object
      properties:
        optimized:
          type: boolean
          description: >
            True when the URL points under an optimized prefix (/regions/,
            /landmarks/) and therefore requires hosted responsive variants.
        missing:
          type: array
          items:
            type: string
          description: >
            Files (relative to public/) referenced by the URL that are not
            hosted. Empty when the URL is valid or out of scope.
        reachable:
          type: ["boolean", "null"]
          description: >
            External URL reachability: true when an external (http/https) URL
            resolved to a reachable image, false when it is genuinely broken
            (404 / non-image), and null when not checked (local URL) or only
            transiently unreachable (timeout / DNS / 5xx / 429), which must not
            block a save.
        message:
          type: ["string", "null"]
          description: >
            Human-readable warning when an image is not hosted or an external
            URL is unreachable, otherwise null.
      required:
        - optimized
        - missing
        - reachable
        - message

    ImageGalleryItem:
      type: object
      properties:
        url:
          type: string
          description: Path to store on the record, e.g. "/landmarks/pyramids-giza.jpg".
        name:
          type: string
          description: Human-friendly label derived from the file name.
      required:
        - url
        - name

    ImageGalleryGroup:
      type: object
      properties:
        prefix:
          type: string
          description: The optimized prefix this group covers, e.g. "/regions/".
        label:
          type: string
          description: Display label for the group, e.g. "Regions".
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageGalleryItem"
      required:
        - prefix
        - label
        - images

    ImageGallery:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/ImageGalleryGroup"
      required:
        - groups

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DailyQuiz:
      type: object
      properties:
        quizId:
          type: integer
        date:
          type: string
      required:
        - quizId
        - date

    QuizSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        published:
          type: boolean
        questionCount:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        createdAt:
          type: string
      required:
        - id
        - title
        - description
