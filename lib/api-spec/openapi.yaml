openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Geography Quiz platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quizzes
    description: Quiz management
  - name: questions
    description: Question management
  - name: quiz-attempts
    description: Quiz attempt and scoring
  - name: user-progress
    description: User progress tracking
  - name: categories
    description: Category hierarchy management
paths:
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories (flat)
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/tree:
    get:
      operationId: getCategoryTree
      tags: [categories]
      summary: Get the full category tree (nested)
      responses:
        "200":
          description: Nested category tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryNode"

  /categories/by-slug/{slug}:
    get:
      operationId: getCategoryBySlug
      tags: [categories]
      summary: Get a category and its quizzes (including descendants) by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category with ancestors, descendants, and quizzes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryWithQuizzes"
        "404":
          description: Not found

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (children's parent becomes null)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /quizzes:
    get:
      operationId: listQuizzes
      tags: [quizzes]
      summary: List all quizzes
      responses:
        "200":
          description: List of quizzes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizSummary"
    post:
      operationId: createQuiz
      tags: [quizzes]
      summary: Create a new quiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuizBody"
      responses:
        "201":
          description: Created quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quizzes/{id}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      summary: Get a quiz with its questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizWithQuestions"
        "404":
          description: Quiz not found
    patch:
      operationId: updateQuiz
      tags: [quizzes]
      summary: Update a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuizBody"
      responses:
        "200":
          description: Updated quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "404":
          description: Quiz not found
    delete:
      operationId: deleteQuiz
      tags: [quizzes]
      summary: Delete a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Quiz not found

  /quizzes/{id}/questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List questions for a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a question for a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Quiz not found

  /questions/{id}:
    get:
      operationId: getQuestion
      tags: [questions]
      summary: Get a single question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Not found
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionBody"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Not found
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /quiz-attempts:
    post:
      operationId: submitQuizAttempt
      tags: [quiz-attempts]
      summary: Submit answers for a quiz attempt and get score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuizAttemptBody"
      responses:
        "200":
          description: Quiz result with score and per-question feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizAttemptResult"

  /quizzes/{id}/stats:
    get:
      operationId: getQuizStats
      tags: [quizzes]
      summary: Get stats for a quiz (total attempts, average score)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizStats"
        "404":
          description: Not found

  /user/progress:
    get:
      operationId: getUserProgress
      tags: [user-progress]
      summary: Get the current user's quiz attempt history and stats
      responses:
        "200":
          description: User progress summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"
        "401":
          description: Unauthorized

  /user/progress/{quizId}:
    get:
      operationId: getUserQuizProgress
      tags: [user-progress]
      summary: Get the current user's history for a specific quiz
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User quiz history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserQuizProgress"
        "401":
          description: Unauthorized

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    QuizSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        questionCount:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - category
        - difficulty
        - questionCount
        - categories
        - createdAt

    Quiz:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - description
        - category
        - difficulty
        - createdAt
        - updatedAt

    QuizWithQuestions:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        createdAt:
          type: string
        updatedAt:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
      required:
        - id
        - title
        - description
        - category
        - difficulty
        - categories
        - createdAt
        - updatedAt
        - questions

    CreateQuizBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        categoryIds:
          type: array
          items:
            type: integer
      required:
        - title
        - description
        - category
        - difficulty

    UpdateQuizBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        categoryIds:
          type: array
          items:
            type: integer

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parentId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - parentId
        - imageUrl
        - createdAt
        - updatedAt

    CategoryNode:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parentId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        quizCount:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/CategoryNode"
      required:
        - id
        - name
        - slug
        - parentId
        - imageUrl
        - quizCount
        - children

    CategoryWithQuizzes:
      type: object
      properties:
        category:
          $ref: "#/components/schemas/Category"
        ancestors:
          type: array
          description: "Path from root to (but not including) this category."
          items:
            $ref: "#/components/schemas/Category"
        descendants:
          type: array
          description: "All descendant categories (any depth)."
          items:
            $ref: "#/components/schemas/Category"
        quizzes:
          type: array
          description: "Quizzes in this category or any of its descendants."
          items:
            $ref: "#/components/schemas/QuizSummary"
      required:
        - category
        - ancestors
        - descendants
        - quizzes

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
          description: "Optional. Auto-generated from name if omitted."
        parentId:
          type: ["integer", "null"]
      required:
        - name

    UpdateCategoryBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        parentId:
          type: ["integer", "null"]

    Question:
      type: object
      properties:
        id:
          type: integer
        quizId:
          type: integer
        text:
          type: string
        options:
          type: array
          items:
            type: string
        correctOption:
          type: integer
        explanation:
          type: string
        funFact:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        orderIndex:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - quizId
        - text
        - options
        - correctOption
        - explanation
        - funFact
        - imageUrl
        - orderIndex
        - createdAt
        - updatedAt

    CreateQuestionBody:
      type: object
      properties:
        text:
          type: string
        options:
          type: array
          items:
            type: string
        correctOption:
          type: integer
        explanation:
          type: string
        funFact:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        orderIndex:
          type: integer
      required:
        - text
        - options
        - correctOption
        - explanation
        - orderIndex

    UpdateQuestionBody:
      type: object
      properties:
        text:
          type: string
        options:
          type: array
          items:
            type: string
        correctOption:
          type: integer
        explanation:
          type: string
        funFact:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        orderIndex:
          type: integer

    SubmitQuizAttemptBody:
      type: object
      properties:
        quizId:
          type: integer
        answers:
          type: array
          items:
            $ref: "#/components/schemas/QuestionAnswer"
      required:
        - quizId
        - answers

    QuestionAnswer:
      type: object
      properties:
        questionId:
          type: integer
        selectedOption:
          type: integer
      required:
        - questionId
        - selectedOption

    QuizAttemptResult:
      type: object
      properties:
        quizId:
          type: integer
        score:
          type: integer
        totalQuestions:
          type: integer
        percentage:
          type: number
        questionResults:
          type: array
          items:
            $ref: "#/components/schemas/QuestionResult"
      required:
        - quizId
        - score
        - totalQuestions
        - percentage
        - questionResults

    QuestionResult:
      type: object
      properties:
        questionId:
          type: integer
        isCorrect:
          type: boolean
        selectedOption:
          type: integer
        correctOption:
          type: integer
        explanation:
          type: string
        funFact:
          type: ["string", "null"]
      required:
        - questionId
        - isCorrect
        - selectedOption
        - correctOption
        - explanation
        - funFact

    QuizStats:
      type: object
      properties:
        quizId:
          type: integer
        totalAttempts:
          type: integer
        averageScore:
          type: number
        averagePercentage:
          type: number
      required:
        - quizId
        - totalAttempts
        - averageScore
        - averagePercentage

    UserProgress:
      type: object
      properties:
        totalAttempts:
          type: integer
        totalQuizzesTaken:
          type: integer
        averagePercentage:
          type: number
        bestPercentage:
          type: number
        recentAttempts:
          type: array
          items:
            $ref: "#/components/schemas/UserAttemptSummary"
      required:
        - totalAttempts
        - totalQuizzesTaken
        - averagePercentage
        - bestPercentage
        - recentAttempts

    UserAttemptSummary:
      type: object
      properties:
        id:
          type: integer
        quizId:
          type: integer
        quizTitle:
          type: string
        score:
          type: integer
        totalQuestions:
          type: integer
        percentage:
          type: number
        completedAt:
          type: string
      required:
        - id
        - quizId
        - quizTitle
        - score
        - totalQuestions
        - percentage
        - completedAt

    UserQuizProgress:
      type: object
      properties:
        quizId:
          type: integer
        attempts:
          type: integer
        bestScore:
          type: integer
        bestPercentage:
          type: number
        lastAttemptAt:
          type: ["string", "null"]
        history:
          type: array
          items:
            $ref: "#/components/schemas/UserAttemptSummary"
      required:
        - quizId
        - attempts
        - bestScore
        - bestPercentage
        - lastAttemptAt
        - history
