      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CourseImportItem"
        replace_image:
          type: boolean
          default: false
          description: >-
            When true, a re-import of an existing course overwrites its current
            cover image with the image_url from this payload (if any). Off by
            default, so re-import only fills in a missing cover and never
            clobbers a cover an admin already set. The replacement image is
            validated exactly like the create/fill path.
      required:
        - items

    CourseImportModuleResult:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        created:
          type: boolean
        questionsAdded:
          type: integer
        lessonsAdded:
          type: integer
      required:
        - title
        - slug
        - created
        - questionsAdded
        - lessonsAdded

    CourseImportResult:
      type: object
      properties:
        courseId:
          type: integer
        courseSlug:
          type: string
        courseTitle:
          type: string
        courseCreated:
          type: boolean
        modulesCreated:
          type: integer
        lessonsAdded:
          type: integer
        questionsAdded:
          type: integer
        modules:
          type: array
          items:
            $ref: "#/components/schemas/CourseImportModuleResult"
      required:
        - courseId
        - courseSlug
        - courseTitle
        - courseCreated
        - modulesCreated
        - lessonsAdded
        - questionsAdded
        - modules
