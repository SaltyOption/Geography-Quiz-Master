openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Geography Quiz platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quizzes
    description: Quiz management
  - name: questions
    description: Question management
  - name: quiz-attempts
    description: Quiz attempt and scoring
  - name: user-progress
    description: User progress tracking
  - name: categories
    description: Category hierarchy management
  - name: me
    description: Current user identity and admin status
  - name: courses
    description: Layered learning courses (topics with modules and lessons)
paths:
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories (flat)
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/tree:
    get:
      operationId: getCategoryTree
      tags: [categories]
      summary: Get the full category tree (nested)
      responses:
        "200":
          description: Nested category tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryNode"

  /categories/by-slug/{slug}:
    get:
      operationId: getCategoryBySlug
      tags: [categories]
      summary: Get a category and its quizzes (including descendants) by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category with ancestors, descendants, and quizzes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryWithQuizzes"
        "404":
          description: Not found

  /categories/by-slug/{slug}/practice:
    get:
      operationId: getCategoryPracticeQuiz
      tags: [categories]
      summary: Build a practice quiz from questions tagged with this category (or any descendant)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: "Maximum number of questions to include (default 20)."
          schema:
            type: integer
      responses:
        "200":
          description: A shuffled set of tagged questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryPracticeQuiz"
        "404":
          description: Not found

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (children's parent becomes null)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get current user identity and admin status
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /daily-quiz:
    get:
      operationId: getDailyQuiz
      tags: [quizzes]
      summary: Get today's daily quiz selection
      description: Returns the deterministic quiz of the day for the current UTC date.
      responses:
        "200":
          description: Today's daily quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyQuiz"
        "404":
          description: No quizzes available

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /quizzes:
    get:
      operationId: listQuizzes
      tags: [quizzes]
      summary: List all quizzes
      responses:
        "200":
          description: List of quizzes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizSummary"
    post:
      operationId: createQuiz
      tags: [quizzes]
      summary: Create a new quiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuizBody"
      responses:
        "201":
          description: Created quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quizzes/bulk-import:
    post:
      operationId: bulkImportQuizzes
      tags: [quizzes]
      summary: Bulk import quizzes and questions from a flat list grouped by topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkImportBody"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /quizzes/export:
    get:
      operationId: exportQuizzes
      tags: [quizzes]
      summary: Export all quizzes and questions in the bulk-import JSON shape
      responses:
        "200":
          description: All quizzes and questions, ready to be re-imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizExportResult"
        "422":
          description: Some questions are malformed and would not round-trip cleanly
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizExportError"

  /quizzes/{id}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      summary: Get a quiz with its questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizWithQuestions"
        "404":
          description: Quiz not found
    patch:
      operationId: updateQuiz
      tags: [quizzes]
      summary: Update a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuizBody"
      responses:
        "200":
          description: Updated quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "404":
          description: Quiz not found
    delete:
      operationId: deleteQuiz
      tags: [quizzes]
      summary: Delete a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Quiz not found

  /quizzes/{id}/questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List questions for a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a question for a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Quiz not found

  /questions/{id}:
    get:
      operationId: getQuestion
      tags: [questions]
      summary: Get a single question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Not found
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionBody"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Not found
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /quiz-attempts:
    post:
      operationId: submitQuizAttempt
      tags: [quiz-attempts]
      summary: Submit answers for a quiz attempt and get score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuizAttemptBody"
      responses:
        "200":
          description: Quiz result with score and per-question feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizAttemptResult"

  /quizzes/{id}/stats:
    get:
      operationId: getQuizStats
      tags: [quizzes]
      summary: Get stats for a quiz (total attempts, average score)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizStats"
        "404":
          description: Not found

  /user/progress:
    get:
      operationId: getUserProgress
      tags: [user-progress]
      summary: Get the current user's quiz attempt history and stats
      responses:
        "200":
          description: User progress summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"
        "401":
          description: Unauthorized

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all learning courses with per-user mastery progress (when signed in)
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseSummary"

  /courses/bulk-import:
    post:
      operationId: bulkImportCourse
      tags: [courses]
      summary: Bulk import or update a course from a flat list of question objects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseImportBody"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseImportResult"

  /courses/{slug}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course with its modules (and per-user mastery if signed in)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"
        "404":
          description: Not found

  /courses/{slug}/modules/{moduleSlug}:
    get:
      operationId: getCourseModule
      tags: [courses]
      summary: Get a single module with its lessons and questions (locked modules return 403 for signed-in users)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: moduleSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Module detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleDetail"
        "403":
          description: Module is locked (previous module not yet mastered)
        "404":
          description: Not found

  /admin/courses/{slug}:
    get:
      operationId: getAdminCourse
      tags: [courses]
      summary: Admin - get a course with full nested modules, lessons, and questions (no mastery gating)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Admin course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCourseDetail"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /course-questions/{id}:
    patch:
      operationId: updateCourseQuestion
      tags: [courses]
      summary: Admin - update a single course (learning module) question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseQuestionBody"
      responses:
        "200":
          description: Updated course question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseQuestion"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /course-modules/{moduleId}/progress:
    get:
      operationId: getCourseModuleProgress
      tags: [courses]
      summary: Get the signed-in user's saved in-progress answers for a module
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved progress (null if anonymous or none saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleProgress"
    put:
      operationId: saveCourseModuleProgress
      tags: [courses]
      summary: Save the signed-in user's in-progress answers for a module (no-op for anonymous)
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveModuleProgressBody"
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleProgress"
    delete:
      operationId: clearCourseModuleProgress
      tags: [courses]
      summary: Clear the signed-in user's saved progress for a module (no-op for anonymous)
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved:
                    type: boolean
                required:
                  - saved

  /course-modules/{moduleId}/attempts:
    post:
      operationId: submitCourseModuleAttempt
      tags: [courses]
      summary: Submit answers for a module attempt and get score + per-question feedback
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitModuleAttemptBody"
      responses:
        "200":
          description: Module attempt result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleAttemptResult"
        "404":
          description: Module not found

  /user/progress/{quizId}:
    get:
      operationId: getUserQuizProgress
      tags: [user-progress]
      summary: Get the current user's history for a specific quiz
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User quiz history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserQuizProgress"
        "401":
          description: Unauthorized

components:
  schemas:
    Me:
      type: object
      properties:
        userId:
          type: ["string", "null"]
        isAdmin:
          type: boolean
      required:
        - userId
        - isAdmin

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DailyQuiz:
      type: object
      properties:
        quizId:
          type: integer
        date:
          type: string
      required:
        - quizId
        - date

    QuizSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        questionCount:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - category
        - difficulty
        - questionCount
        - categories
        - createdAt

    Quiz:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - description
        - category
        - difficulty
        - createdAt
        - updatedAt

    QuizWithQuestions:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        createdAt:
          type: string
        updatedAt:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
      required:
        - id
        - title
        - description
        - category
        - difficulty
        - categories
        - createdAt
        - updatedAt
        - questions

    CreateQuizBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        categoryIds:
          type: array
          items:
            type: integer
      required:
        - title
        - description
        - category
        - difficulty

    BulkImportItem:
      type: object
      properties:
        topic:
          type: string
          minLength: 1
        question:
          type: string
          minLength: 1
        options:
          type: object
          properties:
            A: { type: string, minLength: 1 }
            B: { type: string, minLength: 1 }
            C: { type: string, minLength: 1 }
            D: { type: string, minLength: 1 }
          required: [A, B, C, D]
        correct_answer:
          type: string
          enum: [A, B, C, D]
        explanation:
          type: string
          minLength: 1
        fun_fact:
          type: ["string", "null"]
        difficulty:
          type: ["string", "null"]
        image_url:
          type: ["string", "null"]
        categories:
          type: array
          description: "Optional category names to tag this question with. Existing categories are matched by name (case-insensitive); unknown names are created as new root categories."
          items:
            type: string
      required:
        - topic
        - question
        - options
        - correct_answer
        - explanation

    BulkImportBody:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BulkImportItem"
        categoryIds:
          type: array
          items:
            type: integer
      required:
        - items

    QuizExportResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BulkImportItem"
        skippedEmptyQuizzes:
          type: array
          items:
            type: string
      required:
        - items
        - skippedEmptyQuizzes

    QuizExportInvalidQuestion:
      type: object
      properties:
        questionId:
          type: integer
        quizTitle:
          type: string
        reason:
          type: string
      required:
        - questionId
        - quizTitle
        - reason

    QuizExportError:
      type: object
      properties:
        error:
          type: string
        invalid:
          type: array
          items:
            $ref: "#/components/schemas/QuizExportInvalidQuestion"
      required:
        - error
        - invalid

    BulkImportTopicResult:
      type: object
      properties:
        topic:
          type: string
        quizId:
          type: integer
        created:
          type: boolean
        questionsAdded:
          type: integer
      required:
        - topic
        - quizId
        - created
        - questionsAdded

    BulkImportResult:
      type: object
      properties:
        quizzesCreated:
          type: integer
        quizzesUpdated:
          type: integer
        questionsAdded:
          type: integer
        categoriesCreated:
          type: array
          description: "Names of categories that were newly created from question `categories` tags during this import."
          items:
            type: string
        topics:
          type: array
          items:
            $ref: "#/components/schemas/BulkImportTopicResult"
      required:
        - quizzesCreated
        - quizzesUpdated
        - questionsAdded
        - categoriesCreated
        - topics

    UpdateQuizBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        categoryIds:
          type: array
          items:
            type: integer

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parentId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - parentId
        - imageUrl
        - createdAt
        - updatedAt

    CategoryNode:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parentId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        quizCount:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/CategoryNode"
      required:
        - id
        - name
        - slug
        - parentId
        - imageUrl
        - quizCount
        - children

    CategoryWithQuizzes:
      type: object
      properties:
        category:
          $ref: "#/components/schemas/Category"
        ancestors:
          type: array
          description: "Path from root to (but not including) this category."
          items:
            $ref: "#/components/schemas/Category"
        descendants:
          type: array
          description: "All descendant categories (any depth)."
          items:
            $ref: "#/components/schemas/Category"
        quizzes:
          type: array
          description: "Quizzes in this category or any of its descendants."
          items:
            $ref: "#/components/schemas/QuizSummary"
        taggedQuestionCount:
          type: integer
          description: "Number of questions tagged with this category or any of its descendants (available as a practice quiz)."
      required:
        - category
        - ancestors
        - descendants
        - quizzes
        - taggedQuestionCount

    PracticeQuestion:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        options:
          type: array
          items:
            type: string
        correctOption:
          type: integer
        explanation:
          type: string
        funFact:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
      required:
        - id
        - text
        - options
        - correctOption
        - explanation
        - funFact
        - imageUrl

    CategoryPracticeQuiz:
      type: object
