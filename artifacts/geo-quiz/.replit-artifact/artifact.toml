kind = "web"
previewPath = "/"
title = "Geography Quiz"
version = "1.0.0"
id = "artifacts/geo-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/assets/", "/favicon.svg", "/logo.svg", "/opengraph.jpg", "/llms.txt", "/robots.txt", "/landmarks/", "/regions/"]
localPort = 26064

[services.development]
run = "pnpm --filter @workspace/geo-quiz run dev"

[services.production]
# Build the frontend unconditionally so this static layer always serves the
# CURRENT hashed assets. The api-server bundles and serves its own copy of this
# same build as the single source of truth, so even if this layer is ever stale
# or missing an asset, requests fall through to the api-server and still resolve.
build = [ "bash", "-c", "pnpm --filter @workspace/geo-quiz run build" ]
publicDir = "artifacts/geo-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26064"
BASE_PATH = "/"
